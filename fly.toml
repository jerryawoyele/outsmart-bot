# fly.toml app configuration file generated for outsmart-bot on 2026-03-14T21:58:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'outsmart-bot'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
