syntax = "proto3";

package yellowstone;

message SubscribeRequest {
  repeated string accounts = 1;
  repeated string account_datas = 2;
  repeated string transactions = 3;
  repeated string transactions_status = 4;
  repeated string blocks = 5;
  repeated string blocks_meta = 6;
  string commitment = 7;
  repeated string accounts_data_slice = 8;
  bool vote = 9;
  bool failed = 10;
  bool slot_status = 11;
  bool entry = 12;
}

message SubscribeRequestAccounts {
  repeated string account = 1;
  repeated string owner = 2;
  repeated string filters = 3;
}

message SubscribeRequestAccountData {
  repeated string account = 1;
  repeated string owner = 2;
}

message SubscribeRequestTransactions {
  repeated string account_include = 1;
  repeated string account_exclude = 2;
  repeated string account_required = 3;
  bool vote = 4;
  bool failed = 5;
}

message SubscribeRequestBlocks {
  repeated string account_include = 1;
  repeated string account_exclude = 2;
  repeated string account_required = 3;
  bool include_transactions = 4;
  bool include_accounts = 5;
  bool include_entries = 6;
}

message SubscribeUpdate {
  oneof update_oneof {
    SubscribeUpdateAccount account = 1;
    SubscribeUpdateAccountData account_data = 2;
    SubscribeUpdateTransaction transaction = 3;
    SubscribeUpdateTransactionStatus transaction_status = 4;
    SubscribeUpdateBlock block = 5;
    SubscribeUpdateBlockMeta block_meta = 6;
    SubscribeUpdateSlot slot = 7;
    SubscribeUpdateEntry entry = 8;
  }
  repeated string filters;
}

message SubscribeUpdateAccount {
  repeated string account = 1;
  repeated string owner = 2;
  bytes data = 3;
  uint64 lamports = 4;
  bool executable = 5;
  uint64 rent_epoch = 6;
  bool is_writable = 7;
}

message SubscribeUpdateAccountData {
  repeated string account = 1;
  repeated string owner = 2;
  bytes data = 3;
}

message SubscribeUpdateTransaction {
  repeated string signatures = 1;
  bool is_vote = 2;
  bytes transaction = 3;
  bytes meta = 4;
  uint64 slot = 5;
  uint64 block_time = 6;
}

message SubscribeUpdateTransactionStatus {
  repeated string signatures = 1;
  uint64 slot = 2;
}

message SubscribeUpdateBlock {
  repeated string signatures = 1;
  bytes block = 2;
  uint64 slot = 3;
  uint64 block_time = 4;
  uint64 block_height = 5;
}

message SubscribeUpdateBlockMeta {
  repeated string signatures = 1;
  uint64 slot = 2;
  uint64 block_time = 3;
  uint64 block_height = 4;
  uint64 executed_transaction_count = 5;
}

message SubscribeUpdateSlot {
  uint64 slot = 1;
  bool is_parent = 2;
  string status = 3;
}

message SubscribeUpdateEntry {
  uint64 slot = 1;
  uint64 index = 2;
  bytes hash = 3;
  bytes executed_transaction_count = 4;
  bytes starting_transaction_index = 5;
}

service Yellowstone {
  rpc Subscribe (SubscribeRequest) returns (stream SubscribeUpdate) {}
}
